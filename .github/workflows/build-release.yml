name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build executable
      run: |
        pyinstaller --onefile --windowed --name Pomodoro --icon=NONE src/pomodoro.py

    - name: Calculate SHA-256
      id: hash
      shell: pwsh
      run: |
        $hash = (Get-FileHash -Path dist/Pomodoro.exe -Algorithm SHA256).Hash
        echo "sha256=$hash" >> $env:GITHUB_OUTPUT
        echo "SHA-256: $hash"

    - name: Create release notes
      id: notes
      shell: pwsh
      run: |
        $version = "${{ github.ref_name }}"
        $sha = "${{ steps.hash.outputs.sha256 }}"

        $notes = @"
        ## 🍅 Pomodoro Timer $version

        ### 📦 Download
        - **Pomodoro.exe** - Windows 10/11 standalone executable (no installation required)

        ### ✨ Features
        - 4-phase Pomodoro cycle (Focus/Stretch/Review/Long Break)
        - Warm cream color scheme for comfortable viewing
        - Gentle notification sound (C5-E5 interval)
        - Progress tracking with visual dots
        - Always on top option

        ### 🔒 File Verification
        **SHA-256:** ``$sha``

        To verify the downloaded file:
        ``````powershell
        # PowerShell
        Get-FileHash -Path Pomodoro.exe -Algorithm SHA256
        ``````

        ### 🚀 Usage
        1. Download **Pomodoro.exe**
        2. Double-click to run (no installation needed)
        3. Click Start to begin your first focus session

        ### 📝 Changelog
        See [commits](${{ github.server_url }}/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.sha }}) for detailed changes.
        "@

        $notes | Out-File -FilePath release_notes.md -Encoding utf8
        echo "Created release notes"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        files: dist/Pomodoro.exe
        body_path: release_notes.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
